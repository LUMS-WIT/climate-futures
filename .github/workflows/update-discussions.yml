name: Update Discussions

on:
  discussion:
    types: [created, edited, deleted, answered, unanswered, category_changed]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

concurrency:
  group: update-discussions
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch discussions and update discussions.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_discussions.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discussions.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh discussions list"
            git push
          fi
